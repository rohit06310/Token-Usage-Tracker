services:
  - type: web
    name: ai-usage-dashboard-api
    env: docker
    dockerfilePath: docker/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: DASHBOARD_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
