# ==============================================================================
# Unified AI Usage Dashboard — Docker Compose
# ==============================================================================
# Supabase is used as the managed PostgreSQL database.
# No local Postgres container is needed for production use.
# A local Postgres service is provided below (commented out) for offline dev.
# ==============================================================================

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ai-usage-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # These can override .env values for local dev
      APP_ENV: ${APP_ENV:-development}
    volumes:
      # Mount source code for hot-reload in dev
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    depends_on: ["db"]  # Use local DB
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ==============================================================================
# Optional: Local PostgreSQL for offline development
# Uncomment this section and update DATABASE_URL in .env to use it:
# DATABASE_URL=postgresql://postgres:password@db:5432/ai_usage_dev
# ==============================================================================
  db:
    image: postgres:16-alpine
    container_name: ai-usage-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_usage_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
