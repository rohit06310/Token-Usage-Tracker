name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout source
      # ----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Set up Python
      # ----------------------------------------------------------------
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # ----------------------------------------------------------------
      # 3. Install dependencies
      # ----------------------------------------------------------------
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------------------
      # 4. Set up test environment variables
      #    These are safe placeholder values — tests use SQLite in-memory.
      #    Real secrets should NEVER be stored in CI env or this file.
      # ----------------------------------------------------------------
      - name: Configure test environment
        run: |
          # Generate a valid Fernet key dynamically
          FERNET_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "FERNET_KEY=$FERNET_KEY" >> $GITHUB_ENV
          echo "DATABASE_URL=sqlite:///:memory:" >> $GITHUB_ENV
          echo "DASHBOARD_API_KEY=ci-test-key-$(date +%s)" >> $GITHUB_ENV
          echo "APP_ENV=development" >> $GITHUB_ENV

      # ----------------------------------------------------------------
      # 5. Run tests with coverage
      # ----------------------------------------------------------------
      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

      # ----------------------------------------------------------------
      # 6. (Optional) Upload coverage report
      # Uncomment after adding pytest-cov to requirements.txt
      # ----------------------------------------------------------------
      # - name: Upload coverage
      #   uses: codecov/codecov-action@v4
      #   with:
      #     files: coverage.xml

  # ----------------------------------------------------------------
  # Lint job (non-blocking for now — remove || true to enforce)
  # ----------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff
      - name: Run ruff
        run: ruff check app/ tests/ || true   # Non-blocking in Phase 1

  # ----------------------------------------------------------------
  # CD: Build and Push Docker image (Only on main)
  # ----------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
